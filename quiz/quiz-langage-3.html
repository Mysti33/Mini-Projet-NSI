		<meta charset="UTF-8">

	</head>
	<body class="page-quiz">
		<header>
			<nav class="navbar">
				<div class="navbar-brand">
					<a href="../index.html" class="logo">
						<span class="logo-icon">&lt;</span>Code<span class="logo-icon">/&gt;</span>
					</a>
				</div>
				<ul class="nav-links">
					<li><a href="../index.html">Accueil</a></li>

					<li><a href="../quiz.html">Quiz</a></li>
					<li><a href="../Contact.html">Contact</a></li>
				</ul>
			</nav>

		<section class="hero">
			<h2>Quiz - Langage pour projets variés</h2>
			<p>Trouvez le langage qui s’adapte aux projets que vous aimez créer.</p>
		</section>
		<main class="content-wrapper">
			<form class="quiz-form" action="#" method="get">
				<fieldset>
					<legend>Quel type de projet voulez-vous lancer ?</legend>
					<div class="form-control">
						<input type="radio" id="app" name="project" value="Application">
						<label for="app">Application</label>
					</div>
					<div class="form-control">
						<input type="radio" id="site" name="project" value="Site">
						<label for="site">Site internet</label>
					</div>
					<div class="form-control">
						<input type="radio" id="data" name="project" value="Données">
						<label for="data">Analyse de données</label>
					</div>
				</fieldset>
				<fieldset>
					<legend>Aimez-vous apprendre plusieurs outils ?</legend>
					<div class="form-control">
						<input type="radio" id="many" name="learning" value="Plusieurs">
						<label for="many">Oui, j’aime apprendre plusieurs langages</label>
					</div>
					<div class="form-control">
						<input type="radio" id="focus" name="learning" value="Focus">
						<label for="focus">Non, je préfère me concentrer sur un seul</label>
					</div>
				</fieldset>
				<fieldset>
					<legend>Quelle est votre priorité ?</legend>
					<div class="form-control">
						<input type="radio" id="rapid" name="priority" value="Rapide">
						<label for="rapid">Apprentissage rapide</label>
					</div>
					<div class="form-control">
						<input type="radio" id="power" name="priority" value="Puissance">
						<label for="power">Puissance et flexibilité</label>
					</div>
				</fieldset>
				<button type="submit" class="btn-submit">Choisir mon langage</button>
			</form>
		</main>

	</body>
